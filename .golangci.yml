linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gofmt
    - gosimple
    - ineffassign
    - typecheck

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow
      - unusedwrite

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unusedwrite
